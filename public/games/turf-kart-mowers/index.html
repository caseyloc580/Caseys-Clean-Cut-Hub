function scheduleSprinkler(x,z,delay,owner=null){let m=cyl(76,4,M.water,32);m.material=M.water.clone();m.material.transparent=true;m.material.opacity=.35;m.position.set(x,6,z);scene.add(m);game.events.push({x,z,t:delay,blast:1,r:155,owner,mesh:m,done:false})}
function hazards(dt){game.nextSprinkler-=dt;notice.textContent=`Random sprinkler in ${Math.max(0,Math.ceil(game.nextSprinkler))} seconds`;notice.classList.toggle('show',game.nextSprinkler<4);if(game.nextSprinkler<=0){scheduleSprinkler(rnd(120,game.def[1]-120),rnd(120,game.def[2]-120),2,null);game.nextSprinkler=10}for(const ev of game.events){ev.t-=dt;if(ev.t<=0&&!ev.done){ev.done=true;ev.mesh.scale.set(1.5,1,1.5);ev.mesh.material.opacity=.65;for(const p of game.players)if(D(p.x,p.z,ev.x,ev.z)<ev.r){p.freeze=Math.max(p.freeze,3)}}if(ev.done)ev.blast-=dt}game.events=game.events.filter(ev=>{if(ev.done&&ev.blast<=0){scene.remove(ev.mesh);return false}return true})}
function updatePlayHost(dt,pads){game.time-=dt;hazards(dt);for(const p of game.players){if(p.weapon){p.weaponTimer-=dt;if(p.weaponTimer<=0)p.weapon=null}if(p.freeze>0){p.freeze-=dt;p.vel*=.9;p.group.visible=Math.floor(performance.now()/100)%2===0}else{p.group.visible=true;let c=p.bot?{x:Math.sin(performance.now()/700+p.slot),z:-1,use:false}:(p.slot===1&&net.online?net.guestInput:control(p.slot,pads));let throttle=p.bot?1:-c.z,steer=c.x,top=420*p.ch[4]*p.pkv.speed;p.vel+=throttle*760*dt;p.vel*=.968;p.vel=clamp(p.vel,-145,top);p.angle+=steer*2.75*(.35+Math.min(1,Math.abs(p.vel)/top))*dt;let nx=p.x+Math.cos(p.angle)*p.vel*dt,nz=p.z+Math.sin(p.angle)*p.vel*dt;if(collision(nx,p.z))p.vel*=-.25;else p.x=nx;if(collision(p.x,nz))p.vel*=-.25;else p.z=nz;mow(p);for(const it of game.pickups){if(!it.active){it.respawn-=dt;if(it.respawn<=0){it.active=true;it.mesh.visible=true}continue}it.spin+=dt*2.2;it.mesh.rotation.y=it.spin;it.mesh.position.y=18+Math.sin(it.spin*2)*6;if(D(p.x,p.z,it.x,it.z)<58){it.active=false;it.mesh.visible=false;it.respawn=10+rnd(0,7);give(p,it.type)}}let now=c.use&&!p.lastUse;p.lastUse=c.use;if(now)use(p)}p.group.position.set(p.x,0,p.z);p.group.rotation.y=-p.angle+Math.PI/2}if(game.time<=0)finish();if(net.online&&net.role==='host'&&performance.now()-net.lastState>70){net.lastState=performance.now();socket.emit('state:host',snapshot())}}
function snapshot(){return{time:game.time,mowed:game.mowed,players:game.players.map(p=>({x:p.x,z:p.z,a:p.angle,score:p.score,weapon:p.weapon,ammo:p.ammo,freeze:p.freeze,char:p.char})),owners:game.grass.flat().map(t=>t.by),pickups:game.pickups.map(p=>p.active)}}
function applySnapshot(snap){if(!game||!snap)return;game.time=snap.time;game.mowed=snap.mowed;snap.players.forEach((sp,i)=>{let p=game.players[i];if(!p)return;p.x=sp.x;p.z=sp.z;p.angle=sp.a;p.score=sp.score;p.weapon=sp.weapon;p.ammo=sp.ammo;p.freeze=sp.freeze;p.group.position.set(p.x,0,p.z);p.group.rotation.y=-p.angle+Math.PI/2});let flat=game.grass.flat();snap.owners.forEach((by,i)=>{if(flat[i]&&flat[i].by!==by){flat[i].by=by;tileMat(flat[i])}});snap.pickups.forEach((active,i)=>{if(game.pickups[i]){game.pickups[i].active=active;game.pickups[i].mesh.visible=active}})}
function finish(){state='results';overlay.classList.remove('hidden');hud.classList.remove('playing');notice.classList.remove('show')}
function update(dt,pads){if(state==='join')updateJoin(pads);else if(state==='mode')updateMode(pads);else if(state==='select')updateSelect(dt,pads);else if(state==='play'){if(net.online&&net.role==='guest'){let c=control(1,pads);if(performance.now()-net.lastSend>50){net.lastSend=performance.now();socket.emit('input:guest',c)}}else updatePlayHost(dt,pads)}else if(state==='results'){let ok=PRESSED.Space||PRESSED.Enter;pads.forEach(p=>{if(p?.edgeA)ok=true});if(ok)reset()}}
function reset(){state='join';game=null;level=0;mode=0;net.online=false;net.role=null;clear();overlay.classList.remove('hidden');hud.classList.remove('playing');notice.classList.remove('show');slots.forEach(s=>{s.joined=false;s.pad=null;s.ready=false})}
$('resetBtn').onclick=reset;
function createRoom(){if(!hasSocket)return alert('Run this through the Node server first.');socket.emit('room:create',{gameId:'turf-kart-mowers',name:'Player 1'},res=>{if(!res.ok)return alert(res.error);net.online=true;net.role='host';net.playerId=1;net.room=res.code;slots[0].joined=true;slots[1].joined=true;mode=4;state='onlineLobby';history.replaceState(null,'',location.pathname+'?room='+res.code)})}
function joinRoom(code){if(!hasSocket)return alert('Run this through the Node server first.');socket.emit('room:join',{gameId:'turf-kart-mowers',code,name:'Player 2'},res=>{if(!res.ok)return alert(res.error);net.online=true;net.role='guest';net.playerId=2;net.room=res.code;slots[0].joined=true;slots[1].joined=true;mode=4;state='onlineLobby'})}
if(socket){socket.on('room:update',room=>{net.roomInfo=room});socket.on('game:start',()=>{net.online=true;start(0)});socket.on('input:guest',input=>{net.guestInput=input});socket.on('state:host',snap=>applySnapshot(snap));socket.on('peer:disconnected',m=>alert(m.message||'Peer disconnected.'));socket.on('connect',()=>{if(net.pendingJoin){joinRoom(net.pendingJoin.toUpperCase());net.pendingJoin=null}})}
function onlineHTML(){if(state==='onlineMenu')return `<div class="title yellow">ONLINE ROOM</div><p>Host a room, copy the invite link, and send it by text or email.</p><div class="menuGrid"><div class="menuCard"><h2>Host Match</h2><button onclick="window.ctkCreateRoom()">Create Room</button></div><div class="menuCard"><h2>Join Room</h2><input id="roomCode" placeholder="Room code"><br><br><button onclick="window.ctkJoinRoom()">Join</button></div></div><p>${hasSocket?'Backend connected.':'Backend not detected. Start the Node server.'}</p>`;if(state==='onlineLobby'){let link=location.origin+location.pathname+'?room='+net.room,ri=net.roomInfo||{};return `<div class="title yellow">ROOM ${net.room}</div><p>${net.role==='host'?'Copy this invite link and send it:':'Waiting for host to start.'}</p><input value="${link}" readonly onclick="this.select()"><br><br>${net.role==='host'?'<button onclick="navigator.clipboard.writeText(\''+link+'\')">Copy Invite Link</button> <button onclick="window.ctkStartOnline()">Start Online Match</button>':''}<div class="menuGrid"><div class="menuCard ready"><h2>HOST</h2><p>${ri.hostConnected?'Connected':'Waiting'}</p></div><div class="menuCard ${ri.guestConnected?'ready':''}"><h2>GUEST</h2><p>${ri.guestConnected?'Connected':'Waiting for invite'}</p></div></div>`}return''}
window.ctkCreateRoom=createRoom;window.ctkJoinRoom=()=>joinRoom(($('roomCode')?.value||'').trim().toUpperCase());window.ctkStartOnline=()=>socket.emit('game:start',{seed:Date.now()});
function html(){let oh=onlineHTML();if(oh)return oh;if(state==='join')return `<div class="title">CASEY'S CLEAN CUT</div><div class="title yellow">TURF KART MOWERS</div><p>Ground-up 3D kart-mowing prototype with real online backend.</p><div class="menuGrid"><div class="menuCard ${slots[0].joined?'ready':''}"><h2>PLAYER 1</h2><h1>${slots[0].joined?'JOINED':'WAITING'}</h1><p>Hold A / Space / 1</p></div><div class="menuCard ${slots[1].joined?'ready':''}"><h2>PLAYER 2</h2><h1>${slots[1].joined?'JOINED':'WAITING'}</h1><p>Hold A / Enter / 2</p></div></div>`;if(state==='mode')return `<div class="title">CHOOSE MODE</div><p>P1 chooses. A confirms.</p><div class="menuGrid">${modes.map((m,i)=>`<div class="menuCard ${i===mode?'selected':''}"><h2>${m[0]}</h2><p>${m[1]}</p></div>`).join('')}</div>`;if(state==='select')return `<div class="title">CHARACTER + PERK</div><p>Left/right character. Up/down perk. A readies.</p><div class="menuGrid">${[0,1].filter(s=>!(mode===2&&s===1)).map(s=>{let sl=slots[s],ch=chars[sl.char],pk=perks[sl.perk];return `<div class="menuCard ${sl.ready?'ready':''}"><h2>PLAYER ${s+1}</h2><h1>${ch[0]}</h1><p>${pk[0]} - ${pk[1]}</p><h2>${sl.ready?'READY':'NOT READY'}</h2></div>`}).join('')}</div>`;if(state==='results'){let sorted=[...game.players].sort((a,b)=>b.score-a.score);return `<div class="title yellow">${sorted[0].ch[0]} WINS!</div>${sorted.map(p=>`<h2>${p.bot?'BOT':'P'+(p.slot+1)} ${p.ch[0]}: ${p.score}</h2>`).join('')}<p>Press A / Space / Enter to restart.</p>`}return''}
function drawOverlay(){if(state==='play'){overlay.classList.add('hidden');return}overlay.classList.remove('hidden');let h=html();if(h!==oldHTML){screen.innerHTML=h;oldHTML=h}}
function sync(){UI.p1.textContent='$'+accounts[0].cash;UI.p2.textContent='$'+accounts[1].cash;UI.s1.textContent=`Speed ${accounts[0].speed} • Deck ${accounts[0].deck}`;UI.s2.textContent=`Speed ${accounts[1].speed} • Deck ${accounts[1].deck}`;UI.pad.textContent=(navigator.getGamepads?Array.from(navigator.getGamepads()).filter(Boolean).length:0)+' controller(s) detected';if(game){UI.level.textContent=game.def[0];UI.timer.textContent=Math.ceil(game.time)+'s';let pct=Math.round(game.mowed/game.total*100);UI.progress.style.width=pct+'%';UI.progressText.textContent=pct+'% mowed';UI.status.textContent=game.message;let h=game.players.filter(p=>!p.bot),pane=p=>p?`<b>P${p.slot+1} ${p.ch[0]}</b><br>Score ${p.score}<br>${p.weapon?weaponName(p.weapon)+' '+(p.ammo||Math.ceil(p.weaponTimer)+'s'):'No item'}${p.freeze>0?' • FROZEN '+p.freeze.toFixed(1)+'s':''}`:'AI';UI.ht.textContent=Math.ceil(game.time)+'s';UI.h1.innerHTML=pane(h[0]);UI.h2.innerHTML=pane(h[1])}else{UI.level.textContent=state.toUpperCase();UI.timer.textContent='--';UI.progress.style.width='0%';UI.progressText.textContent='Mow and steal stripes.';UI.status.textContent=state==='onlineLobby'?'Online lobby connected.':state==='onlineMenu'?'Create or join an online room.':'Ready.'}}
function resize(){let r=canvas.getBoundingClientRect();renderer.setSize(Math.max(1,r.width),Math.max(1,r.height),false)}function camera(cam,p,w,h){cam.aspect=w/h;cam.updateProjectionMatrix();cam.position.set(p.x-Math.cos(p.angle)*520,310,p.z-Math.sin(p.angle)*520);cam.lookAt(p.x+Math.cos(p.angle)*160,60,p.z+Math.sin(p.angle)*160)}
function render(){resize();let w=canvas.width,h=canvas.height;if(state==='play'&&game){let humans=game.players.filter(p=>!p.bot),view=net.online?(net.playerId===2?humans[1]:humans[0]):null;if(net.online){camera(cam1,view,w,h);renderer.setViewport(0,0,w,h);renderer.setScissor(0,0,w,h);renderer.render(scene,cam1)}else if(humans.length>=2){let half=Math.floor(w/2);camera(cam1,humans[0],half,h);renderer.setViewport(0,0,half,h);renderer.setScissor(0,0,half,h);renderer.render(scene,cam1);camera(cam2,humans[1],w-half,h);renderer.setViewport(half,0,w-half,h);renderer.setScissor(half,0,w-half,h);renderer.render(scene,cam2)}else{camera(cam1,humans[0]||game.players[0],w,h);renderer.setViewport(0,0,w,h);renderer.setScissor(0,0,w,h);renderer.render(scene,cam1)}}else{renderer.setViewport(0,0,w,h);renderer.setScissor(0,0,w,h);renderer.clear(true,true,true)}}
function touchSetup(){let stick=$('stick'),knob=$('knob'),id=null,rect=null;stick.addEventListener('pointerdown',e=>{id=e.pointerId;rect=stick.getBoundingClientRect();stick.setPointerCapture(id);mv(e)});stick.addEventListener('pointermove',e=>{if(e.pointerId===id)mv(e)});stick.addEventListener('pointerup',e=>{if(e.pointerId===id){id=null;touch.x=touch.z=0;knob.style.transform='translate(0,0)'}});function mv(e){let cx=rect.left+rect.width/2,cy=rect.top+rect.height/2,dx=e.clientX-cx,dy=e.clientY-cy,m=Math.min(55,L(dx,dy)),a=Math.atan2(dy,dx);touch.x=Math.cos(a)*m/55;touch.z=Math.sin(a)*m/55;knob.style.transform=`translate(${Math.cos(a)*m}px,${Math.sin(a)*m}px)`}let a=$('btnA'),b=$('btnB');a.addEventListener('pointerdown',()=>{touch.a=true;PRESSED.Space=true});a.addEventListener('pointerup',()=>touch.a=false);b.addEventListener('pointerdown',()=>{touch.b=true;PRESSED.Backspace=true});b.addEventListener('pointerup',()=>touch.b=false)}touchSetup();
function frame(now){let dt=Math.min(.033,(now-last)/1000);last=now;let pads=scanPads();update(dt,pads);render();drawOverlay();sync();PRESSED={};requestAnimationFrame(frame)}
window.addEventListener('keydown',e=>{if(!KEY[e.code])PRESSED[e.code]=true;KEY[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()});window.addEventListener('keyup',e=>KEY[e.code]=false);
reset();if(net.pendingJoin){state='onlineMenu'}requestAnimationFrame(frame);
})();
</script>
