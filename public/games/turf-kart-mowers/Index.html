*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#061109;color:#f6fff2}
body{overflow:auto}

.panel{width:min(1120px,96%);background:linear-gradient(#173b25,#07120a);border:1px solid #397447;border-radius:24px;padding:22px;box-shadow:0 20px 70px rgba(0,0,0,.45)}

button{cursor:pointer;background:linear-gradient(#ffed68,#d9b916);color:#10210d}
button:disabled{opacity:.45;cursor:not-allowed}
.btn2{background:linear-gradient(#94ff78,#49cf3d)}
.btn3{background:linear-gradient(#9bd1ff,#4199ff)}
.btnRed{background:linear-gradient(#ff9b9b,#e04b4b)}
input{width:min(100%,680px);background:#ecffef;color:#10210d}
pre{white-space:pre-wrap;background:#061109;border:1px solid #397447;border-radius:14px;padding:12px;min-height:95px;max-height:220px;overflow:auto}
#game{display:none;position:fixed;inset:0;width:100%;height:100%;background:#2f8d39}
#hud{display:none;position:fixed;top:14px;left:14px;right:14px;z-index:4;pointer-events:none}
