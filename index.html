<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Casey's Game Hub</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#1d4a2b,#061109 72%);color:#f6fff2;font-family:Arial,Helvetica,sans-serif}
main{width:min(1100px,100%);margin:0 auto;padding:22px}header{padding:26px 0}h1{font-size:44px;margin:0;line-height:1}.sub{color:#bdd9bd;margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}.card{background:linear-gradient(#173b25,#07120a);border:1px solid #397447;border-radius:20px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.card h2{margin:0 0 8px}.status{display:inline-block;background:#213d29;color:#e2ffe5;border-radius:999px;padding:4px 8px;font-size:12px;margin:8px 0}a{display:inline-block;text-decoration:none;border:0;border-radius:14px;padding:12px 14px;margin-top:10px;font-weight:900;background:linear-gradient(#ffed68,#d9b916);color:#10210d}
.note{background:rgba(0,0,0,.25);border:1px solid #397447;border-radius:18px;padding:14px;margin-top:18px;color:#d7f2d8;line-height:1.45}
code{background:#102519;padding:2px 5px;border-radius:6px}
</style>
</head>
<body>
<main>
<header>
<h1>Casey's Game Hub</h1>
<div class="sub">One server for all your Casey/YRH games. Add new games as folders and register them in <code>public/games.json</code>.</div>
</header>
<section id="games" class="grid"></section>
<div class="note">
<b>Upload check:</b> this page is inside the <code>public</code> folder. If you can see this on Render, the <code>public</code> folder uploaded correctly.
</div>
</main>
<script>
async function loadGames(){
  const res = await fetch('/api/games');
  const data = await res.json();
  const box = document.getElementById('games');
  box.innerHTML = '';
  for(const game of data.games){
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h2>${game.title}</h2>
      <p>${game.description}</p>
      <div class="status">${game.status}</div><br>
      <a href="${game.path}">Play / Open</a>
    `;
    box.appendChild(card);
  }
}
loadGames().catch(err=>{
  document.getElementById('games').innerHTML = '<div class="card"><h2>Could not load games</h2><p>'+err.message+'</p></div>';
});
</script>
</body>
</html>
